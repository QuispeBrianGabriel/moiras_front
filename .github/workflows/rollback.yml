name: Rollback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a la que deseas volver (ej. 0.2.4)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-railway:
    name: Rollback en Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verificar que la imagen exista en GHCR
        env:
          IMAGE_NAME_UPPER: ${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_NAME_UPPER" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${IMAGE_LOWER}:${{ inputs.version }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "Verificando $IMAGE en GHCR..."
          docker manifest inspect "$IMAGE" > /dev/null || {
            echo "::error::La imagen $IMAGE no existe en GHCR. Revisá el número de versión."
            exit 1
          }

      - name: Apuntar Railway a la versión anterior y redeployar
        uses: ./.github/actions/railway-deploy
        with:
          image: ${{ env.IMAGE }}
          service-id: ${{ secrets.RAILWAY_SERVICE_ID }}
          environment-id: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          account-token: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}
