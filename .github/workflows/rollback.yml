name: Rollback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a la que deseas volver (ej. 0.2.4)'
        required: true
        type: string

jobs:
  rollback-ghcr:
    name: Re-taggear imagen en GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Normalizar nombre de imagen a minúsculas
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, Retag y Push
        run: |
          IMAGE_BASE="ghcr.io/${{ steps.image.outputs.name }}"
          TARGET_IMAGE="$IMAGE_BASE:${{ inputs.version }}"
          PROD_IMAGE="$IMAGE_BASE:production"

          echo "Descargando versión destino: $TARGET_IMAGE"
          docker pull $TARGET_IMAGE

          echo "Re-taggeando como production..."
          docker tag $TARGET_IMAGE $PROD_IMAGE

          echo "Subiendo nuevo puntero de producción a GHCR..."
          docker push $PROD_IMAGE

  deploy-railway:
    name: Forzar Redeply en Railway
    runs-on: ubuntu-latest
    needs: rollback-ghcr
    steps:
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar en Railway
        run: railway redeploy --service ${{ secrets.RAILWAY_SERVICE_ID }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
