name: Rollback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a la que deseas volver (ej. 0.2.4)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-railway:
    name: Rollback en Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verificar que la imagen exista en GHCR
        env:
          IMAGE_NAME_UPPER: ${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_NAME_UPPER" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${IMAGE_LOWER}:${{ inputs.version }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "Verificando $IMAGE en GHCR..."
          docker manifest inspect "$IMAGE" > /dev/null || {
            echo "::error::La imagen $IMAGE no existe en GHCR. Revisá el número de versión."
            exit 1
          }

      - name: Apuntar Railway a la versión anterior y redeployar
        env:
          RAILWAY_ACCOUNT_TOKEN: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          set -euo pipefail
          API="https://backboard.railway.com/graphql/v2"

          curl --fail --silent -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_ACCOUNT_TOKEN" \
            -d "$(jq -n \
              --arg serviceId "$RAILWAY_SERVICE_ID" \
              --arg environmentId "$RAILWAY_ENVIRONMENT_ID" \
              --arg image "$IMAGE" \
              '{
                query: "mutation serviceInstanceUpdate($serviceId: String!, $environmentId: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: $serviceId, environmentId: $environmentId, input: $input) }",
                variables: { serviceId: $serviceId, environmentId: $environmentId, input: { source: { image: $image } } }
              }')" | tee /tmp/update.json

          grep -q '"errors"' /tmp/update.json && { echo "::error::Fallo el update"; exit 1; } || true

          curl --fail --silent -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_ACCOUNT_TOKEN" \
            -d "$(jq -n \
              --arg serviceId "$RAILWAY_SERVICE_ID" \
              --arg environmentId "$RAILWAY_ENVIRONMENT_ID" \
              '{
                query: "mutation serviceInstanceDeployV2($serviceId: String!, $environmentId: String!) { serviceInstanceDeployV2(serviceId: $serviceId, environmentId: $environmentId) }",
                variables: { serviceId: $serviceId, environmentId: $environmentId }
              }')" | tee /tmp/deploy.json

          grep -q '"errors"' /tmp/deploy.json && { echo "::error::Fallo el deploy"; exit 1; } || true

          echo "Rollback completo: Railway ahora corre $IMAGE"
