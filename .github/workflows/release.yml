name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  github-release:
    name: Crear GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Crear release con notas automáticas
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  build-and-push:
    name: Build & Push Imagen
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Normalizar nombre de imagen a minúsculas
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Apuntar Railway a la imagen versionada y redeployar
        uses: ./.github/actions/railway-deploy
        with:
          image: ghcr.io/${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.version }}
          service-id: ${{ secrets.RAILWAY_SERVICE_ID }}
          environment-id: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          account-token: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}
